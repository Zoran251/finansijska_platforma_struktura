<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Balance - Finansijska Platforma</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0E0E10, #16161A);
            color: #F8F8FF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .redirect-container {
            text-align: center;
            padding: 2rem;
            background: rgba(22, 22, 26, 0.8);
            border-radius: 1rem;
            border: 1px solid rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            max-width: 600px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            border-radius: 50%;
        }
        
        h1 {
            color: #D4AF37;
            margin-bottom: 1rem;
            font-size: 2.5rem;
        }
        
        p {
            margin-bottom: 2rem;
            font-size: 1.2rem;
            color: #BBBBBB;
        }
        
        .btn {
            background: linear-gradient(135deg, #D4AF37, #F1C40F);
            color: #0E0E10;
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            margin: 0.5rem;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }
        
        .countdown {
            font-size: 1.5rem;
            color: #D4AF37;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <img src="https://i.imgur.com/yQGiMd5.png" alt="Golden Balance Logo" class="logo">
        <h1>Golden Balance</h1>
        <p>Dobrodošli u novu Golden Balance finansijsku platformu!</p>
        <p>Biti ćete automatski preusmereni na novu verziju...</p>
        
        <div class="countdown" id="countdown">5</div>
        
        <div style="margin-top: 2rem;">
            <a href="finansijska_platforma/index.html" class="btn">Idite odmah</a>
        </div>
    </div>

    <script>
        let count = 5;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            count--;
            countdownElement.textContent = count;
            
            if (count <= 0) {
                clearInterval(timer);
                window.location.href = 'finansijska_platforma/index.html';
            }
        }, 1000);
    </script>
</body>
</html>
